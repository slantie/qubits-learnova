name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'services/video-service/**'
      - 'docker-compose.prod.yml'
      - 'nginx/**'

jobs:
  deploy:
    name: Deploy to Oracle Ubuntu Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e

            # Navigate to the project directory
            /home/ubuntu/qubits-learnova

            # Pull latest changes
            git pull origin main

            # Rebuild and restart all backend services
            docker compose --env-file .env -f docker-compose.prod.yml up --build -d --remove-orphans

            # Remove dangling images to free space
            docker image prune -f

            echo "✅ Deployment complete!"
