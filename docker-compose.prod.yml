version: '3.9'

services:
  # ── Redis (internal only) ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - learnova-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Main API Server ───────────────────────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./server/.env.prod
    environment:
      - VIRTUAL_HOST=apilearnova.harshdodiya.tech
      - VIRTUAL_PORT=4000
      - LETSENCRYPT_HOST=apilearnova.harshdodiya.tech
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - learnova-internal
      - nginx-proxy

  # ── Video Service ─────────────────────────────────────────────────────────────
  video-service:
    build:
      context: ./services/video-service
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    env_file:
      - ./services/video-service/.env.prod
    environment:
      - VIRTUAL_HOST=video.apilearnova.harshdodiya.tech
      - VIRTUAL_PORT=4001
      - LETSENCRYPT_HOST=video.apilearnova.harshdodiya.tech
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - learnova-internal
      - nginx-proxy

networks:
  learnova-internal:
    driver: bridge

  # Existing nginx-proxy network from ~/n8n/SSL/
  # Run `docker network ls` on your server to confirm the name
  nginx-proxy:
    external: true
    name: ssl_default
