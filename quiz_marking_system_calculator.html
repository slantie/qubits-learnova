
<style>
  .wrap { padding: 1rem 0; font-family: var(--font-sans); }
  .section-label { font-size: 12px; color: var(--color-text-secondary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 12px; }
  .metric-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 16px; text-align: center; }
  .metric-val { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
  .metric-label { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .row label { font-size: 13px; color: var(--color-text-secondary); width: 130px; flex-shrink: 0; }
  .row input[type=range] { flex: 1; }
  .row .val { font-size: 13px; font-weight: 500; color: var(--color-text-primary); min-width: 36px; text-align: right; }
  .attempt-row { display: grid; grid-template-columns: 80px 1fr 90px 90px 90px; gap: 8px; align-items: center; margin-bottom: 8px; }
  .attempt-label { font-size: 13px; color: var(--color-text-secondary); }
  .pill { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
  .pill-blue { background: #E6F1FB; color: #0C447C; }
  .pill-green { background: #EAF3DE; color: #27500A; }
  .pill-amber { background: #FAEEDA; color: #633806; }
  .pill-red { background: #FCEBEB; color: #791F1F; }
  .pill-gray { background: #F1EFE8; color: #444441; }
  .bar-wrap { background: var(--color-background-secondary); border-radius: 4px; height: 6px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .factor-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 8px; }
  .factor-box { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; }
  .factor-name { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .factor-val { font-size: 16px; font-weight: 500; }
  .divider { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 16px 0; }
  .weight-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .weight-label { font-size: 12px; color: var(--color-text-secondary); width: 120px; }
  .weight-bar { flex: 1; background: var(--color-background-secondary); border-radius: 4px; height: 8px; overflow: hidden; }
  .weight-fill { height: 100%; border-radius: 4px; }
  .weight-num { font-size: 12px; color: var(--color-text-primary); font-weight: 500; width: 32px; text-align: right; }
  .tabs { display: flex; gap: 0; margin-bottom: 16px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); overflow: hidden; }
  .tab { flex: 1; padding: 8px 0; font-size: 13px; background: transparent; border: none; cursor: pointer; color: var(--color-text-secondary); }
  .tab.active { background: var(--color-background-secondary); color: var(--color-text-primary); font-weight: 500; }
  @media (prefers-color-scheme: dark) {
    .pill-blue { background: #042C53; color: #B5D4F4; }
    .pill-green { background: #173404; color: #C0DD97; }
    .pill-amber { background: #412402; color: #FAC775; }
    .pill-red { background: #501313; color: #F7C1C1; }
    .pill-gray { background: #2C2C2A; color: #D3D1C7; }
  }
</style>

<div class="wrap">

  <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;">
    <div class="card">
      <div class="section-label">Weights</div>
      <div class="weight-row">
        <span class="weight-label">Current score</span>
        <div class="weight-bar"><div class="weight-fill" id="wbar-s" style="background:#378ADD;"></div></div>
        <span class="weight-num" id="wval-s">50%</span>
      </div>
      <div class="weight-row">
        <span class="weight-label">Trajectory</span>
        <div class="weight-bar"><div class="weight-fill" id="wbar-t" style="background:#1D9E75;"></div></div>
        <span class="weight-num" id="wval-t">30%</span>
      </div>
      <div class="weight-row">
        <span class="weight-label">Consistency</span>
        <div class="weight-bar"><div class="weight-fill" id="wbar-c" style="background:#BA7517;"></div></div>
        <span class="weight-num" id="wval-c">20%</span>
      </div>
      <hr class="divider">
      <div class="row" style="margin-bottom:0">
        <label>Score weight</label>
        <input type="range" id="ws" min="10" max="80" value="50" step="5">
        <span class="val" id="ws-out">50%</span>
      </div>
      <div class="row" style="margin-bottom:0">
        <label>Trajectory weight</label>
        <input type="range" id="wt" min="10" max="60" value="30" step="5">
        <span class="val" id="wt-out">30%</span>
      </div>
    </div>

    <div class="card">
      <div class="section-label">Max points per attempt</div>
      <div class="row"><label>1st attempt</label><input type="range" id="t1" min="1" max="30" value="10" step="1"><span class="val" id="t1-out">10</span></div>
      <div class="row"><label>2nd attempt</label><input type="range" id="t2" min="1" max="20" value="7" step="1"><span class="val" id="t2-out">7</span></div>
      <div class="row"><label>3rd attempt</label><input type="range" id="t3" min="1" max="15" value="5" step="1"><span class="val" id="t3-out">5</span></div>
      <div class="row" style="margin-bottom:0"><label>4th+ attempt</label><input type="range" id="t4" min="1" max="10" value="2" step="1"><span class="val" id="t4-out">2</span></div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Attempt scores (drag to adjust)</div>
    <div id="attempts-container"></div>
    <button onclick="addAttempt()" style="font-size:13px; margin-top:4px;">+ Add attempt</button>
  </div>

  <div class="card">
    <div class="section-label">Results</div>
    <div id="results-grid" style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px;"></div>
    <div id="attempt-breakdown"></div>
  </div>

  <div style="position:relative; width:100%; height:260px;" class="card">
    <div class="section-label">Points per attempt</div>
    <canvas id="chartCanvas"></canvas>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
let attempts = [60, 80, 50];
let chart;

function getTierPoints(idx) {
  const vals = [
    parseInt(document.getElementById('t1').value),
    parseInt(document.getElementById('t2').value),
    parseInt(document.getElementById('t3').value),
    parseInt(document.getElementById('t4').value),
  ];
  return vals[Math.min(idx, 3)];
}

function getWeights() {
  const ws = parseInt(document.getElementById('ws').value);
  const wt = parseInt(document.getElementById('wt').value);
  const wc = 100 - ws - wt;
  return { ws: ws/100, wt: wt/100, wc: Math.max(0, wc)/100 };
}

function computeTrajectoryFactor(curr, prev) {
  if (prev === null) return 0.5;
  const delta = (curr - prev) / 100;
  return Math.max(0, Math.min(1, (delta + 1) / 2));
}

function computeConsistencyFactor(curr, avg) {
  if (avg === null) return 1.0;
  return Math.max(0, 1 - Math.abs((curr - avg) / 100));
}

function computeAll() {
  const { ws, wt, wc } = getWeights();
  let runningSum = 0;
  const results = [];

  for (let i = 0; i < attempts.length; i++) {
    const score = attempts[i];
    const prev = i > 0 ? attempts[i-1] : null;
    const avg = i > 0 ? runningSum / i : null;

    const sf = score / 100;
    const tf = computeTrajectoryFactor(score, prev);
    const cf = computeConsistencyFactor(score, avg);

    const composite = (sf * ws) + (tf * wt) + (cf * wc);
    const tierPts = getTierPoints(i);
    const earned = Math.max(1, Math.round(tierPts * composite));

    results.push({ score, sf, tf, cf, composite, tierPts, earned, avg, prev });
    runningSum += score;
  }
  return results;
}

function renderWeightBars() {
  const ws = parseInt(document.getElementById('ws').value);
  const wt = parseInt(document.getElementById('wt').value);
  const wc = Math.max(0, 100 - ws - wt);
  document.getElementById('wbar-s').style.width = ws + '%';
  document.getElementById('wbar-t').style.width = wt + '%';
  document.getElementById('wbar-c').style.width = wc + '%';
  document.getElementById('wval-s').textContent = ws + '%';
  document.getElementById('wval-t').textContent = wt + '%';
  document.getElementById('wval-c').textContent = wc + '%';
  document.getElementById('ws-out').textContent = ws + '%';
  document.getElementById('wt-out').textContent = wt + '%';
}

function getTrendPill(i, results) {
  if (i === 0) return '<span class="pill pill-gray">baseline</span>';
  const delta = results[i].score - results[i].prev;
  if (delta > 10) return '<span class="pill pill-green">+' + delta + '%</span>';
  if (delta > 0) return '<span class="pill pill-blue">+' + delta + '%</span>';
  if (delta === 0) return '<span class="pill pill-gray">same</span>';
  return '<span class="pill pill-red">' + delta + '%</span>';
}

function renderAttempts() {
  const c = document.getElementById('attempts-container');
  c.innerHTML = '';
  c.innerHTML += `<div style="display:grid; grid-template-columns:80px 1fr 90px 90px 90px; gap:8px; margin-bottom:4px;">
    <span style="font-size:11px;color:var(--color-text-secondary);">Attempt</span>
    <span style="font-size:11px;color:var(--color-text-secondary);">Score</span>
    <span style="font-size:11px;color:var(--color-text-secondary);text-align:center;">Score %</span>
    <span style="font-size:11px;color:var(--color-text-secondary);text-align:center;">Change</span>
    <span style="font-size:11px;color:var(--color-text-secondary);text-align:right;">Remove</span>
  </div>`;

  attempts.forEach((a, i) => {
    const div = document.createElement('div');
    div.className = 'attempt-row';
    div.innerHTML = `
      <span class="attempt-label">Attempt ${i+1}</span>
      <div style="display:flex;align-items:center;gap:8px;flex:1;">
        <input type="range" min="0" max="100" step="5" value="${a}" data-idx="${i}" class="score-slider" style="flex:1;">
        <span style="font-size:13px;font-weight:500;min-width:32px;">${a}%</span>
      </div>
      <div style="text-align:center;">
        <div class="bar-wrap"><div class="bar-fill" style="width:${a}%;background:#378ADD;"></div></div>
      </div>
      <div style="text-align:center;" id="trend-${i}"></div>
      <div style="text-align:right;">${attempts.length > 1 ? `<button onclick="removeAttempt(${i})" style="font-size:11px;color:var(--color-text-secondary);background:none;border:none;cursor:pointer;padding:0;">remove</button>` : ''}</div>
    `;
    c.appendChild(div);
  });

  document.querySelectorAll('.score-slider').forEach(sl => {
    sl.addEventListener('input', function() {
      const idx = parseInt(this.dataset.idx);
      attempts[idx] = parseInt(this.value);
      render();
    });
  });
}

function renderResults(results) {
  const totalPts = results.reduce((s, r) => s + r.earned, 0);
  const avgScore = Math.round(results.reduce((s, r) => s + r.score, 0) / results.length);
  const bestScore = Math.max(...results.map(r => r.score));
  const avgComposite = Math.round((results.reduce((s, r) => s + r.composite, 0) / results.length) * 100);

  document.getElementById('results-grid').innerHTML = `
    <div class="metric-card"><div class="metric-val">${totalPts}</div><div class="metric-label">Total points earned</div></div>
    <div class="metric-card"><div class="metric-val">${avgScore}%</div><div class="metric-label">Average score</div></div>
    <div class="metric-card"><div class="metric-val">${bestScore}%</div><div class="metric-label">Best attempt</div></div>
    <div class="metric-card"><div class="metric-val">${avgComposite}%</div><div class="metric-label">Avg composite</div></div>
  `;

  let bd = '';
  results.forEach((r, i) => {
    const trendDelta = r.prev !== null ? (r.score - r.prev) : null;
    const trendStr = trendDelta === null ? '—' : (trendDelta >= 0 ? '+' + trendDelta + '%' : trendDelta + '%');
    const trendColor = trendDelta === null ? 'var(--color-text-secondary)' : trendDelta > 0 ? '#1D9E75' : trendDelta < 0 ? '#E24B4A' : 'var(--color-text-secondary)';
    bd += `
      <div style="border-top:0.5px solid var(--color-border-tertiary);padding:10px 0;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <span style="font-size:13px;font-weight:500;">Attempt ${i+1} — ${r.score}% correct</span>
          <span style="font-size:15px;font-weight:500;color:var(--color-text-primary);">${r.earned} pts <span style="font-size:12px;color:var(--color-text-secondary);">/ ${r.tierPts} max</span></span>
        </div>
        <div class="factor-grid">
          <div class="factor-box">
            <div class="factor-name">Current score</div>
            <div class="factor-val" style="color:#185FA5;">${Math.round(r.sf*100)}%</div>
            <div style="font-size:11px;color:var(--color-text-secondary);">× ${Math.round(getWeights().ws*100)}% weight</div>
          </div>
          <div class="factor-box">
            <div class="factor-name">Trajectory</div>
            <div class="factor-val" style="color:#0F6E56;">${Math.round(r.tf*100)}%</div>
            <div style="font-size:11px;color:var(--color-text-secondary);">${trendDelta === null ? 'first attempt' : trendStr + ' from prev'}</div>
          </div>
          <div class="factor-box">
            <div class="factor-name">Consistency</div>
            <div class="factor-val" style="color:#854F0B;">${Math.round(r.cf*100)}%</div>
            <div style="font-size:11px;color:var(--color-text-secondary);">${r.avg === null ? 'no history' : 'avg was ' + Math.round(r.avg) + '%'}</div>
          </div>
        </div>
        <div style="margin-top:8px;display:flex;align-items:center;gap:8px;">
          <div class="bar-wrap" style="flex:1;"><div class="bar-fill" style="width:${Math.round(r.composite*100)}%;background:#7F77DD;"></div></div>
          <span style="font-size:12px;color:var(--color-text-secondary);">composite: ${Math.round(r.composite*100)}% → ${r.earned}/${r.tierPts} pts</span>
        </div>
      </div>
    `;
  });
  document.getElementById('attempt-breakdown').innerHTML = bd;
}

function renderChart(results) {
  const labels = results.map((_, i) => 'Attempt ' + (i+1));
  const earnedData = results.map(r => r.earned);
  const maxData = results.map(r => r.tierPts);
  const scoreData = results.map(r => Math.round(r.score / 100 * r.tierPts * 10) / 10);

  if (chart) { chart.destroy(); }
  chart = new Chart(document.getElementById('chartCanvas'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Max possible', data: maxData, backgroundColor: '#D3D1C7', borderRadius: 4 },
        { label: 'Points earned', data: earnedData, backgroundColor: '#7F77DD', borderRadius: 4 },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 12 } } },
        y: { grid: { color: 'rgba(128,128,128,0.1)' }, ticks: { font: { size: 11 }, stepSize: 1 }, beginAtZero: true }
      }
    }
  });
}

function render() {
  renderWeightBars();
  renderAttempts();
  const results = computeAll();
  results.forEach((r, i) => {
    const el = document.getElementById('trend-' + i);
    if (el) {
      const delta = r.prev !== null ? r.score - r.prev : null;
      el.innerHTML = delta === null ? '<span class="pill pill-gray">baseline</span>' :
        delta > 0 ? `<span class="pill pill-green">+${delta}%</span>` :
        delta < 0 ? `<span class="pill pill-red">${delta}%</span>` :
        '<span class="pill pill-gray">same</span>';
    }
  });
  renderResults(results);
  renderChart(results);
}

function addAttempt() {
  if (attempts.length >= 8) return;
  attempts.push(70);
  render();
}

function removeAttempt(idx) {
  if (attempts.length <= 1) return;
  attempts.splice(idx, 1);
  render();
}

['ws','wt','t1','t2','t3','t4'].forEach(id => {
  document.getElementById(id).addEventListener('input', render);
});

render();
</script>
