services:
  # ─── Redis for BullMQ job queue ─────────────────────────────────────────────
  video-redis:
    image: redis:7-alpine
    container_name: learnova-video-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - video_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3-compatible object storage) ───────────────────────────────────
  video-minio:
    image: minio/minio:latest
    container_name: learnova-video-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - video_minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── MinIO bucket initialization ────────────────────────────────────────────
  video-minio-init:
    image: minio/mc:latest
    container_name: learnova-video-minio-init
    depends_on:
      video-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://video-minio:9000 minioadmin minioadmin &&
        mc mb local/video-raw --ignore-existing &&
        mc mb local/video-processed --ignore-existing &&
        mc anonymous set download local/video-processed &&
        echo 'Buckets initialized successfully'
      "

volumes:
  video_redis_data:
  video_minio_data:
